<script type="text/babel">

function sc(s){return STAGE_COLOR[s]||"#888";}
function StagePill({stage}){return <span style={{background:sc(stage),color:"#fff",borderRadius:6,padding:"3px 9px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{stage}</span>;}
function RegionPill({region}){return <span style={{background:REGION_COLOR[region]||"#888",color:"#fff",borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{region}</span>;}

function glpMechCat(m){
  if(/amylin|Amylin/i.test(m)) return "Amylin";
  if(/三激动|五激动|GLP.*GIP.*GCG/i.test(m)) return "三激动剂";
  if(/双激动|GLP.*GIP|GIP.*GLP|GLP.*GCG/i.test(m)&&!/三激动/i.test(m)) return "双激动剂";
  if(/口服小分子/i.test(m)) return "口服小分子";
  if(/CB1|activin|GIPR 拮抗/i.test(m)) return "非 incretin";
  return "GLP-1R 激动剂";
}

// ── GLP-1 TAB ────────────────────────────────────────────────────────────────
function GlpTab(){
  const [stageF,setStageF]=useState("全部");
  const [regionF,setRegionF]=useState("全部");
  const [mechF,setMechF]=useState("全部");
  const [search,setSearch]=useState("");
  const [sortKey,setSortKey]=useState("stage");
  const [sortDir,setSortDir]=useState("asc");
  const [expanded,setExpanded]=useState(null);
  const GLP_STAGES=["全部","临床前","一期","二期","二期→三期","三期"];
  const GLP_REGIONS=["全部","MNC","中国","Biotech"];
  const GLP_MECHS=["全部","GLP-1R 激动剂","双激动剂","三激动剂","Amylin","口服小分子","非 incretin"];

  const rows=useMemo(()=>{
    let r=glpData.filter(d=>{
      if(stageF!=="全部"&&d.stage!==stageF) return false;
      if(regionF!=="全部"&&d.region!==regionF) return false;
      if(mechF!=="全部"&&glpMechCat(d.mechanism)!==mechF) return false;
      if(search){const q=search.toLowerCase();return d.company.toLowerCase().includes(q)||d.drug.toLowerCase().includes(q)||d.drugCN.toLowerCase().includes(q)||d.mechanism.toLowerCase().includes(q);}
      return true;
    });
    r.sort((a,b)=>{
      let av,bv;
      if(sortKey==="stage"){av=STAGE_ORDER[a.stage]??0;bv=STAGE_ORDER[b.stage]??0;}
      else{av=(a[sortKey]||"").toLowerCase();bv=(b[sortKey]||"").toLowerCase();}
      return sortDir==="asc"?(av<bv?-1:av>bv?1:0):(av<bv?1:av>bv?-1:0);
    });
    return r;
  },[stageF,regionF,mechF,search,sortKey,sortDir]);

function CnPharmaTab(){
  const [search,setSearch]=useState("");
  const [provF,setProvF]=useState("全部");
  const [cityF,setCityF]=useState("全部");
  const [provExpanded,setProvExpanded]=useState(false);
  const [cityExpanded,setCityExpanded]=useState(false);
  const [typeF,setTypeF]=useState("全部");
  const [tierF,setTierF]=useState("全部");
  const [sortKey,setSortKey]=useState("rank");
  const [sortDir,setSortDir]=useState("asc");
  const [expanded,setExpanded]=useState(null);

  const provinces=useMemo(()=>["全部",...CN_PROVINCES],[]);
  // Cities derive from data filtered by everything EXCEPT cityF,
  // so tags always reflect what's available given other active filters
  const citiesBase=useMemo(()=>{
    return cnPharmaData.filter(d=>{
      if(provF!=="全部"&&d.province!==provF) return false;
      if(typeF!=="全部"&&d.type!==typeF) return false;
      if(tierF!=="全部"&&d.tier!==tierF) return false;
      if(search){const q=search.toLowerCase();return d.name.toLowerCase().includes(q)||d.nameEN.toLowerCase().includes(q)||d.city.toLowerCase().includes(q)||d.focus.toLowerCase().includes(q);}
      return true;
    });
  },[provF,typeF,tierF,search]);
  const cities=useMemo(()=>["全部",...new Set(citiesBase.map(d=>d.city))].sort(),[citiesBase]);
  const types=["全部","央企","国企","民营","外资"];
  const tiers=["全部","百强","A股扩展"];

  const filtered=useMemo(()=>{
    let r=cnPharmaData.filter(d=>{
      if(provF!=="全部"&&d.province!==provF) return false;
      if(cityF!=="全部"&&d.city!==cityF) return false;
      if(typeF!=="全部"&&d.type!==typeF) return false;
      if(tierF!=="全部"&&d.tier!==tierF) return false;
      if(search){const q=search.toLowerCase();return d.name.toLowerCase().includes(q)||d.nameEN.toLowerCase().includes(q)||d.city.toLowerCase().includes(q)||d.focus.toLowerCase().includes(q);}
      return true;
    });
    r.sort((a,b)=>{
      let av=a[sortKey],bv=b[sortKey];
      if(typeof av==="string"){av=av.toLowerCase();bv=bv.toLowerCase();}
      return sortDir==="asc"?(av<bv?-1:av>bv?1:0):(av<bv?1:av>bv?-1:0);
    });
    return r;
  },[search,provF,cityF,typeF,tierF,sortKey,sortDir]);

  // Province grouping
  const byProvince=useMemo(()=>{
    const m={};
    filtered.forEach(d=>{
      if(!m[d.province]) m[d.province]=[];
      m[d.province].push(d);
    });
    return Object.entries(m).sort((a,b)=>b[1].length-a[1].length);
  },[filtered]);

  function mkTh(key,label){
    const active=sortKey===key;
    return <th onClick={()=>{if(sortKey===key)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortKey(key);setSortDir("asc");}}} style={{padding:"9px 11px",textAlign:"left",fontWeight:600,color:"#374151",cursor:"pointer",whiteSpace:"nowrap",userSelect:"none",fontSize:12}}>{label}<span style={{marginLeft:3,opacity:active?.8:.25}}>{active?(sortDir==="asc"?"↑":"↓"):"↕"}</span></th>;
  }

  // Stats
  const stats=useMemo(()=>({
    total:filtered.length,
    baiqiang:filtered.filter(d=>d.tier==="百强").length,
    astock:filtered.filter(d=>d.tier==="A股扩展").length,
    central:filtered.filter(d=>d.type==="央企").length,
    state:filtered.filter(d=>d.type==="国企").length,
    private:filtered.filter(d=>d.type==="民营").length,
    foreign:filtered.filter(d=>d.type==="外资").length,
  }),[filtered]);

  return (
    <div>
      {/* Stats bar */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
        {[
          {label:"工信部百强",val:stats.baiqiang,col:"#0F172A"},
          {label:"A股扩展",val:stats.astock,col:"#0369A1"},
          {label:"央企",val:stats.central,col:"#B91C1C"},
          {label:"国企",val:stats.state,col:"#1D4ED8"},
          {label:"民营",val:stats.private,col:"#059669"},
          {label:"外资",val:stats.foreign,col:"#7C3AED"},
        ].map(s=>(

                        <th style={{padding:"8px 20px",textAlign:"left",fontWeight:600,color:"#374151",width:220}}>数据源名称</th>
                        <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"#374151",width:70}}>类型</th>
                        <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"#374151",width:80}}>更新时间</th>
                        <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"#374151"}}>说明</th>
                        <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"#374151",width:60}}>链接</th>
                      </tr>
                    </thead>
                    <tbody>
                      {tab.sources.map((s, si)=>{
                        const typeCol={
                          "官方":"#059669","商业数据库":"#7C3AED","企业披露":"#1D4ED8",
                          "咨询报告":"#D97706","学术会议":"#EA580C","排名机构":"#0891B2",
                          "技术服务":"#374151","媒体":"#6B7280","机构官网":"#475569",
                          "高校官网":"#0F4C81","企业官网":"#059669"
                        }[s.type]||"#888";
                        return (
                          <tr key={si} style={{borderTop:"1px solid #F1F5F9",background:si%2===0?"#fff":"#FAFAFA"}}>
                            <td style={{padding:"9px 20px",fontWeight:600,color:"#0F172A"}}>{s.name}</td>
                            <td style={{padding:"9px 12px"}}>
                              <span style={{background:`${typeCol}18`,color:typeCol,borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{s.type}</span>
                            </td>
                            <td style={{padding:"9px 12px",color:"#64748B",whiteSpace:"nowrap",fontSize:11}}>{s.updated}</td>
                            <td style={{padding:"9px 12px",color:"#64748B",fontSize:11,lineHeight:1.5}}>{s.note}</td>
                            <td style={{padding:"9px 12px"}}>
                              {s.url?<a href={s.url} target="_blank" rel="noreferrer" style={{background:"#F1F5F9",color:"#334155",border:"1px solid #CBD5E1",borderRadius:5,padding:"3px 8px",fontSize:11,textDecoration:"none",whiteSpace:"nowrap"}}>🌐</a>:<span style={{color:"#CBD5E1"}}>—</span>}
                            </td>

                        );
                      })}

              )}

          );
        })}
      </div>

      <div style={{marginTop:16,padding:"12px 16px",background:"#F8FAFC",borderRadius:10,fontSize:11,color:"#64748B",lineHeight:1.7}}>
        <strong>说明：</strong>本索引收录截至 2026 年 6 月的主要数据来源。官方数据以发布时间为准；商业数据库为持续动态更新；企业披露以各公司最新公告/年报为准。部分数据为多源交叉核验后的综合判断，营收等财务数据均为约数。
      </div>
    </div>
  );
}


// ── TCM UNIVERSITY TAB COMPONENT ─────────────────────────────────────────────
function TcmUnivTab(){
  const [search,setSearch]=useState("");
  const [countryF,setCountryF]=useState("全部");
  const [regionF,setRegionF]=useState("全部");
  const [provF,setProvF]=useState("全部");
  const [levelF,setLevelF]=useState("全部");
  const [sortKey,setSortKey]=useState("rank");
  const [sortDir,setSortDir]=useState("asc");
  const [provExpanded,setProvExpanded]=useState(false);

  const filtered=useMemo(()=>{
    let r=tcmUnivData.filter(d=>{
      if(countryF!=="全部"&&d.country!==countryF) return false;
      if(regionF!=="全部"&&d.region!==regionF) return false;
      if(provF!=="全部"&&d.province!==provF) return false;
      if(levelF!=="全部"&&d.level!==levelF) return false;
      if(search){const q=search.toLowerCase();return d.name.toLowerCase().includes(q)||d.nameEN.toLowerCase().includes(q)||d.city.toLowerCase().includes(q)||d.focus.toLowerCase().includes(q);}
      return true;
    });
    r.sort((a,b)=>{let av=a[sortKey],bv=b[sortKey];if(typeof av==="string"){av=av.toLowerCase();bv=bv.toLowerCase();}return sortDir==="asc"?(av<bv?-1:av>bv?1:0):(av<bv?1:av>bv?-1:0);});
    return r;
  },[countryF,regionF,provF,levelF,search,sortKey,sortDir]);

  function mkTh(key,label){const active=sortKey===key;return <th onClick={()=>{if(sortKey===key)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortKey(key);setSortDir("asc");}}} style={{padding:"9px 11px",textAlign:"left",fontWeight:600,color:"#374151",cursor:"pointer",whiteSpace:"nowrap",userSelect:"none",fontSize:12}}>{label}<span style={{marginLeft:3,opacity:active?.8:.25}}>{active?(sortDir==="asc"?"↑":"↓"):"↕"}</span></th>;}

  const visProvinces=TCM_PROVINCES.filter(p=>regionF==="全部"||tcmUnivData.some(d=>d.province===p&&d.region===regionF))
    .sort((a,b)=>tcmUnivData.filter(d=>d.province===b).length-tcmUnivData.filter(d=>d.province===a).length);

  return (
    <div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        {[{label:"双一流",val:filtered.filter(d=>d.level.includes("双一流")).length,col:"#D97706"},{label:"省重点",val:filtered.filter(d=>d.level==="省重点").length,col:"#0369A1"},{label:"国家科研院所",val:filtered.filter(d=>d.level==="国家科研院所").length,col:"#059669"}].map(s=>(
          <div key={s.label} style={{background:"#fff",border:`2px solid ${s.col}`,borderRadius:20,padding:"3px 12px",fontSize:12,fontWeight:600,color:s.col,display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:s.col,display:"inline-block"}}/>{s.label}<span style={{background:s.col,color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:11}}>{s.val}</span>
          </div>
        ))}
        <div style={{marginLeft:"auto",fontSize:12,color:"#64748B",alignSelf:"center"}}>显示 <strong>{filtered.length}</strong>/{tcmUnivData.length}</div>
      </div>

      {/* Country */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8,alignItems:"center"}}>
        <span style={{fontSize:11,color:"#94A3B8",fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>国家</span>
        {["全部",...TCM_COUNTRIES].map(c=>{const sel=countryF===c&&c!=="全部";const col="#B91C1C";return <div key={c} onClick={()=>setCountryF(sel?"全部":c)} style={{background:sel?col:"#fff",border:`1.5px solid ${c==="全部"?"#CBD5E1":col}`,borderRadius:16,padding:"3px 10px",fontSize:11,fontWeight:600,color:sel?"#fff":c==="全部"?"#64748B":col,cursor:"pointer",display:"flex",alignItems:"center",gap:4,flexShrink:0}}>{c==="中国"?"🇨🇳 ":""}{c}{c!=="全部"&&<span style={{background:sel?"rgba(255,255,255,.25)":col,color:"#fff",borderRadius:8,padding:"0px 5px",fontSize:10}}>{tcmUnivData.filter(d=>d.country===c).length}</span>}</div>;})}
      </div>

      {/* Region */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8,alignItems:"center"}}>
        <span style={{fontSize:11,color:"#94A3B8",fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>地域</span>
        {TCM_REGIONS.map(r=>{const count=tcmUnivData.filter(d=>d.region===r).length;const col=TCM_REGION_COLOR[r]||"#888";const sel=regionF===r;return <div key={r} onClick={()=>{setRegionF(sel?"全部":r);setProvF("全部");}} style={{background:sel?col:"#fff",border:`1.5px solid ${col}`,borderRadius:16,padding:"3px 10px",fontSize:11,fontWeight:600,color:sel?"#fff":col,cursor:"pointer",display:"flex",alignItems:"center",gap:4,flexShrink:0}}>{r}<span style={{background:sel?"rgba(255,255,255,.25)":col,color:"#fff",borderRadius:8,padding:"0px 5px",fontSize:10}}>{count}</span></div>;})}
      </div>

      {/* Province */}
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:provExpanded?"wrap":"nowrap",overflow:provExpanded?"visible":"hidden",maxHeight:provExpanded?"none":"30px",marginBottom:14}}>
        <span style={{fontSize:11,color:"#94A3B8",fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>省份</span>
        <button onClick={e=>{e.stopPropagation();setProvExpanded(v=>!v);}} style={{flexShrink:0,background:provExpanded?"#0F4C81":"#F1F5F9",color:provExpanded?"#fff":"#475569",border:"1px solid #CBD5E1",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{provExpanded?"收起 ↑":"展开 ↓"}</button>
        {visProvinces.map(p=>{const count=tcmUnivData.filter(d=>d.province===p&&(regionF==="全部"||d.region===regionF)).length;const col=getTcmProvColor(p);const sel=provF===p;return <div key={p} onClick={()=>setProvF(sel?"全部":p)} style={{background:sel?col:"#fff",border:`1.5px solid ${col}`,borderRadius:16,padding:"3px 10px",fontSize:11,fontWeight:600,color:sel?"#fff":col,cursor:"pointer",display:"flex",alignItems:"center",gap:4,flexShrink:0}}>{p}<span style={{background:sel?"rgba(255,255,255,.25)":col,color:"#fff",borderRadius:8,padding:"0px 5px",fontSize:10}}>{count}</span></div>;})}
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
        <input type="text" placeholder="搜索院校/城市/研究方向..." value={search} onChange={e=>setSearch(e.target.value)} style={{border:"1px solid #CBD5E1",borderRadius:8,padding:"6px 12px",fontSize:13,width:220,outline:"none",background:"#fff"}}/>
        <select value={levelF} onChange={e=>setLevelF(e.target.value)} style={{border:"1px solid #CBD5E1",borderRadius:8,padding:"6px 10px",fontSize:13,background:"#fff",cursor:"pointer"}}>{TCM_LEVELS.map(t=><option key={t}>{t}</option>)}</select>
        <button onClick={()=>{setSearch("");setCountryF("全部");setRegionF("全部");setProvF("全部");setLevelF("全部");}} style={{fontSize:12,color:"#64748B",background:"none",border:"1px solid #CBD5E1",borderRadius:8,padding:"6px 12px",cursor:"pointer"}}>重置</button>
      </div>

      {/* Table */}
      <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.08)"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"#F8FAFC",borderBottom:"2px solid #E2E8F0"}}>
              {mkTh("rank","序号")}{mkTh("name","院校名称")}{mkTh("nameEN","英文名")}
              <th style={{padding:"9px 11px",fontWeight:600,color:"#374151",whiteSpace:"nowrap",fontSize:12}}>官网</th>
              {mkTh("country","国家")}{mkTh("region","地域")}{mkTh("province","省份")}{mkTh("city","城市")}{mkTh("level","层次")}{mkTh("focus","研究方向")}<th style={{padding:"9px 11px",fontWeight:600,color:"#374151",fontSize:12}}>特色说明</th>
            </tr></thead>
            <tbody>{filtered.map((row,i)=>{
              const rc=TCM_REGION_COLOR[row.region]||"#888";
              const lc=TCM_LEVEL_COLOR[row.level]||"#888";
              const pc=getTcmProvColor(row.province);
              return <tr key={i} style={{background:i%2===0?"#fff":"#F9FAFB",borderBottom:"1px solid #E2E8F0"}}>
                <td style={{padding:"7px 11px",fontWeight:700,color:"#94A3B8",fontSize:13,textAlign:"center"}}>{row.rank}</td>
                <td style={{padding:"7px 11px",fontWeight:600,color:"#0F172A",minWidth:140,whiteSpace:"nowrap"}}>{row.name}</td>
                <td style={{padding:"7px 11px",color:"#64748B",minWidth:160,fontSize:11}}>{row.nameEN}</td>
                <td style={{padding:"7px 11px"}}>{row.website?<a href={row.website} target="_blank" rel="noreferrer" style={{background:"#F1F5F9",color:"#334155",border:"1px solid #CBD5E1",borderRadius:5,padding:"3px 8px",fontSize:11,fontWeight:500,textDecoration:"none",whiteSpace:"nowrap"}}>🌐 官网</a>:<span style={{color:"#CBD5E1",fontSize:11}}>—</span>}</td>
                <td style={{padding:"7px 11px"}}><span style={{background:"#B91C1C",color:"#fff",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{row.flag} {row.country}</span></td>
                <td style={{padding:"7px 11px"}}><span style={{background:rc,color:"#fff",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{row.region}</span></td>
                <td style={{padding:"7px 11px"}}><span style={{background:pc,color:"#fff",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{row.province}</span></td>
                <td style={{padding:"7px 11px",color:"#64748B",whiteSpace:"nowrap"}}>{row.city}</td>
                <td style={{padding:"7px 11px"}}><span style={{background:lc,color:"#fff",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{row.level}</span></td>
                <td style={{padding:"7px 11px",color:"#4B5563",minWidth:180,fontSize:11}}>{row.focus}</td>
                <td style={{padding:"7px 11px",color:"#64748B",minWidth:160,fontSize:11}}>{row.note}</td>
              </tr>;
            })}</tbody>
          </table>
        </div>
      </div>
      <div style={{marginTop:10,fontSize:11,color:"#94A3B8"}}>收录全国中医药类大学及重要研究机构，涵盖港澳台地区 · 截至 2026.06</div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const HASH_MAP=["#/cnpharma","#/cdmo","#/pharma","#/top50","#/glp1","#/database","#/university","#/intluniv","#/tcm","#/sources"];
  const tabs=["🇨🇳 中国制药领先企业","⚗️ 中国领先CDMO企业","🔬 全球制药50强","🚀 未来十年前200大潜力品种","💊 GLP-1 在研管线","🗂 新药研究数据库索引","🎓 中国生物医药高校与研究所","🌍 海外生物医药高校与研究所","🌿 中医药院校","📋 数据索引与更新"];
  function hashToTab(hash){const i=HASH_MAP.indexOf(hash);return i>=0?i:0;}
  const [tab,setTab]=useState(()=>hashToTab(window.location.hash));
  React.useEffect(()=>{
    function onHash(){setTab(hashToTab(window.location.hash));}
    window.addEventListener("hashchange",onHash);
    return ()=>window.removeEventListener("hashchange",onHash);
  },[]);
  function goTab(i){window.location.hash=HASH_MAP[i];}
  return (
    <div style={{minHeight:"100vh",padding:"20px 16px"}}>
      <div style={{maxWidth:1500,margin:"0 auto"}}>
        <div style={{marginBottom:20}}>
          <h1 style={{fontSize:24,fontWeight:700,color:"#0F172A",marginBottom:4}}>Pharma Ranking Intelligence Index</h1>
          
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
          {/* Row 1 */}
          <div style={{display:"flex",gap:4,background:"#fff",borderRadius:12,padding:4,boxShadow:"0 1px 4px rgba(0,0,0,.08)",width:"fit-content",flexWrap:"wrap"}}>
            {[[0,"#C0392B"],[1,"#7C3AED"],[2,"#0369A1"],[3,"#D97706"]].map(([i,col])=>(
              <button key={i} onClick={()=>goTab(i)} style={{padding:"8px 18px",borderRadius:9,border:"none",background:tab===i?col:"transparent",color:tab===i?"#fff":"#64748B",fontWeight:tab===i?600:400,fontSize:14,cursor:"pointer",transition:"all .15s",borderBottom:tab!==i?`2px solid ${col}`:"none"}}>{tabs[i]}</button>
            ))}
          </div>
          {/* Row 2 */}
          <div style={{display:"flex",gap:4,background:"#fff",borderRadius:12,padding:4,boxShadow:"0 1px 4px rgba(0,0,0,.08)",width:"fit-content"}}>
            {[[4,"#059669"]].map(([i,col])=>(
              <button key={i} onClick={()=>goTab(i)} style={{padding:"8px 18px",borderRadius:9,border:"none",background:tab===i?col:"transparent",color:tab===i?"#fff":"#64748B",fontWeight:tab===i?600:400,fontSize:14,cursor:"pointer",transition:"all .15s",borderBottom:tab!==i?`2px solid ${col}`:"none"}}>{tabs[i]}</button>
            ))}
          </div>
          {/* Row 3 */}
          <div style={{display:"flex",gap:4,background:"#fff",borderRadius:12,padding:4,boxShadow:"0 1px 4px rgba(0,0,0,.08)",width:"fit-content"}}>
            {[[5,"#475569"],[6,"#0F4C81"],[7,"#6D28D9"],[8,"#15803D"],[9,"#0F766E"]].map(([i,col])=>(
              <button key={i} onClick={()=>goTab(i)} style={{padding:"8px 18px",borderRadius:9,border:"none",background:tab===i?col:"transparent",color:tab===i?"#fff":"#64748B",fontWeight:tab===i?600:400,fontSize:14,cursor:"pointer",transition:"all .15s",borderBottom:tab!==i?`2px solid ${col}`:"none"}}>{tabs[i]}</button>
            ))}
          </div>
        </div>
        {tab===0&&<CnPharmaTab/>}
        {tab===1&&<CdmoTab/>}
        {tab===2&&<PharmaTab/>}
        {tab===3&&<Top50Tab/>}
        {tab===4&&<GlpTab/>}
        {tab===5&&<DatabaseTab/>}
        {tab===6&&<UniversityTab/>}
        {tab===7&&<IntlUnivTab/>}
        {tab===8&&<TcmUnivTab/>}
        {tab===9&&<SourcesTab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);


</script>
</body>
</html>
